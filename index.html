<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2026년 1학기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f2ee;
      --surface: #ffffff;
      --border: #e0dbd3;
      --text: #1a1814;
      --text-muted: #9a9590;
      --html-color: #e8533a;
      --html-light: #fdf0ee;
      --html-border: #f5c4bc;
      --csharp-color: #3a7de8;
      --csharp-light: #eef3fd;
      --csharp-border: #bcd0f5;
      --mentor-color: #2db38a;
      --mentor-light: #edfaf5;
      --mentor-border: #b3e8d5;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 32px rgba(0,0,0,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      padding: 0 0 80px;
    }

    /* 배경 패턴 */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #ccc8c0 1px, transparent 1px);
      background-size: 28px 28px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 980px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* 헤더 */
    header {
      padding: 60px 0 48px;
      animation: fadeDown 0.6s ease both;
    }

    .header-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    header h1 {
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1.05;
      color: var(--text);
    }

    header h1 em {
      font-style: normal;
      position: relative;
      display: inline-block;
    }

    header h1 em::after {
      content: '';
      position: absolute;
      left: 0; bottom: 4px;
      width: 100%; height: 6px;
      background: var(--html-color);
      opacity: 0.25;
      border-radius: 2px;
    }

    .header-meta {
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
    }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 8px;
    }

    @media (max-width: 720px) {
      .grid { grid-template-columns: 1fr; }
    }

    @media (min-width: 721px) and (max-width: 900px) {
      .grid { grid-template-columns: 1fr 1fr; }
    }

    /* 카드 */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      animation: fadeUp 0.55s ease both;
    }

    .card:nth-child(1) { animation-delay: 0.08s; }
    .card:nth-child(2) { animation-delay: 0.16s; }
    .card:nth-child(3) { animation-delay: 0.24s; }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-hover);
    }

    /* 카드 헤더 */
    .card-header {
      padding: 24px 24px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .card-html .card-icon  { background: var(--html-light); }
    .card-csharp .card-icon { background: var(--csharp-light); }
    .card-mentor .card-icon { background: var(--mentor-light); }

    .card-title-wrap { flex: 1; }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .card-html .card-label   { color: var(--html-color); }
    .card-csharp .card-label { color: var(--csharp-color); }
    .card-mentor .card-label { color: var(--mentor-color); }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .card-count {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2px 10px;
      white-space: nowrap;
      align-self: center;
    }

    /* 링크 목록 */
    .link-list {
      padding: 12px 0;
      min-height: 80px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 20px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      transition: background 0.15s;
      border-bottom: 1px solid transparent;
    }

    .link-item:last-child { border-bottom: none; }

    .card-html   .link-item:hover { background: var(--html-light); }
    .card-csharp .link-item:hover { background: var(--csharp-light); }
    .card-mentor .link-item:hover { background: var(--mentor-light); }

    .link-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .card-html   .link-dot { background: var(--html-color); }
    .card-csharp .link-dot { background: var(--csharp-color); }
    .card-mentor .link-dot { background: var(--mentor-color); }

    .link-text {
      flex: 1;
      word-break: keep-all;
    }

    .link-arrow {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
    }

    .link-item:hover .link-arrow {
      opacity: 1;
      transform: translateX(3px);
    }

    /* 빈 상태 */
    .empty-state {
      padding: 28px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'DM Mono', monospace;
    }

    .empty-state span {
      display: block;
      font-size: 22px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    /* 링크 추가 버튼 */
    .add-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 0 16px 16px;
      padding: 9px;
      border-radius: 8px;
      border: 1.5px dashed var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card-html   .add-btn:hover { border-color: var(--html-color);   color: var(--html-color);   background: var(--html-light); }
    .card-csharp .add-btn:hover { border-color: var(--csharp-color); color: var(--csharp-color); background: var(--csharp-light); }
    .card-mentor .add-btn:hover { border-color: var(--mentor-color); color: var(--mentor-color); background: var(--mentor-light); }

    /* 모달 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      padding: 32px;
      width: 90%;
      max-width: 420px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.18);
      animation: modalIn 0.25s ease both;
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      color: var(--text);
    }

    .modal label {
      display: block;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .modal input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      background: var(--bg);
      margin-bottom: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .modal input:focus { border-color: #aaa; }

    .modal-btns {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    .btn-cancel {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.15s;
    }

    .btn-cancel:hover { background: var(--bg); }

    .btn-add {
      flex: 2;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--text);
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: opacity 0.15s;
    }

    .btn-add:hover { opacity: 0.85; }

    /* 애니메이션 */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="header-eyebrow">Academic Portal</div>
    <h1><em>2026년</em> 1학기</h1>
    <div class="header-meta">3 courses · Spring Semester</div>
  </header>

  <div class="grid">

    <!-- HTML 카드 -->
    <div class="card card-html" id="card-html">
      <div class="card-header">
        <div class="card-icon">🌐</div>
        <div class="card-title-wrap">
          <div class="card-label">Course 01</div>
          <div class="card-title">HTML</div>
        </div>
        <div class="card-count" id="count-html">0개</div>
      </div>
      <div class="link-list" id="list-html">
        <div class="empty-state"><span>📎</span>링크를 추가해보세요</div>
      </div>
      <button class="add-btn" onclick="openModal('html')">＋ 링크 추가</button>
    </div>

    <!-- C# 카드 -->
    <div class="card card-csharp" id="card-csharp">
      <div class="card-header">
        <div class="card-icon">💻</div>
        <div class="card-title-wrap">
          <div class="card-label">Course 02</div>
          <div class="card-title">C#</div>
        </div>
        <div class="card-count" id="count-csharp">0개</div>
      </div>
      <div class="link-list" id="list-csharp">
        <div class="empty-state"><span>📎</span>링크를 추가해보세요</div>
      </div>
      <button class="add-btn" onclick="openModal('csharp')">＋ 링크 추가</button>
    </div>

    <!-- 취창업멘토링 카드 -->
    <div class="card card-mentor" id="card-mentor">
      <div class="card-header">
        <div class="card-icon">🎯</div>
        <div class="card-title-wrap">
          <div class="card-label">Course 03</div>
          <div class="card-title">취창업멘토링</div>
        </div>
        <div class="card-count" id="count-mentor">0개</div>
      </div>
      <div class="link-list" id="list-mentor">
        <div class="empty-state"><span>📎</span>링크를 추가해보세요</div>
      </div>
      <button class="add-btn" onclick="openModal('mentor')">＋ 링크 추가</button>
    </div>

  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal">
    <h3 id="modal-title">링크 추가</h3>
    <label>링크 제목</label>
    <input type="text" id="input-title" placeholder="예: 1주차 강의자료" />
    <label>URL</label>
    <input type="url" id="input-url" placeholder="https://" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-add" onclick="addLink()">추가하기</button>
    </div>
  </div>
</div>

<script>
  // 데이터 저장
  const data = { html: [], csharp: [], mentor: [] };
  let currentCategory = '';

  const categoryNames = {
    html: 'HTML',
    csharp: 'C#',
    mentor: '취창업멘토링'
  };

  function openModal(cat) {
    currentCategory = cat;
    document.getElementById('modal-title').textContent = categoryNames[cat] + ' — 링크 추가';
    document.getElementById('input-title').value = '';
    document.getElementById('input-url').value = '';
    document.getElementById('modal').classList.add('open');
    setTimeout(() => document.getElementById('input-title').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  function addLink() {
    const title = document.getElementById('input-title').value.trim();
    const url   = document.getElementById('input-url').value.trim();

    if (!title || !url) {
      alert('제목과 URL을 모두 입력해주세요.');
      return;
    }

    // URL 형식 보정
    const finalUrl = url.startsWith('http') ? url : 'https://' + url;

    data[currentCategory].push({ title, url: finalUrl });
    renderList(currentCategory);
    closeModal();
  }

  function renderList(cat) {
    const list = document.getElementById('list-' + cat);
    const count = document.getElementById('count-' + cat);
    const items = data[cat];

    count.textContent = items.length + '개';

    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state"><span>📎</span>링크를 추가해보세요</div>';
      return;
    }

    list.innerHTML = items.map((item, i) => `
      <a class="link-item" href="${item.url}" target="_blank" rel="noopener">
        <span class="link-dot"></span>
        <span class="link-text">${item.title}</span>
        <span class="link-arrow">→</span>
      </a>
    `).join('');
  }

  // Enter 키로 추가
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('modal').classList.contains('open')) {
      addLink();
    }
    if (e.key === 'Escape') closeModal();
  });
</script>
</body>
</html>
